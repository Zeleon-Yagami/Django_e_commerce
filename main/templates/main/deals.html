{% extends "base.html" %}
{% load static %}

{% block title %}
Deals
{% endblock title %}

{% block content %}

<section class="deal-page">

    <!-- HERO -->

    <section class="deal-hero">

        <h1 class="deal-title">
            Hot Deals 🔥
        </h1>

        <p class="deal-subtitle">
            Save big on our most popular products
        </p>

    </section>

    <!-- DEAL PRODUCTS -->

    <section class="deal-products">

        <div class="deal-grid">

            <!-- Product -->

            <div class="deal-card">

                <span class="deal-discount">
                    -40%
                </span>

                <img class="deal-image" src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=800"
                    alt="Watch">

                <div class="deal-info">

                    <h3 class="deal-product-title">
                        Smart Watch
                    </h3>

                    <p class="deal-price">

                        <span class="deal-old-price">
                            $200
                        </span>

                        $120

                    </p>

                    <button class="deal-btn">
                        Grab Deal
                    </button>

                </div>

            </div>

            <!-- Product -->

            <div class="deal-card">

                <span class="deal-discount">
                    -30%
                </span>

                <img class="deal-image" src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=800"
                    alt="Sneaker">

                <div class="deal-info">

                    <h3 class="deal-product-title">
                        Running Shoes
                    </h3>

                    <p class="deal-price">

                        <span class="deal-old-price">
                            $135
                        </span>

                        $95

                    </p>

                    <button class="deal-btn">
                        Grab Deal
                    </button>

                </div>

            </div>

            <!-- Product -->

            <div class="deal-card">

                <span class="deal-discount">
                    -25%
                </span>

                <img class="deal-image" src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=800"
                    alt="Headphone">

                <div class="deal-info">

                    <h3 class="deal-product-title">
                        Wireless Headphone
                    </h3>

                    <p class="deal-price">

                        <span class="deal-old-price">
                            $240
                        </span>

                        $180

                    </p>

                    <button class="deal-btn">
                        Grab Deal
                    </button>

                </div>

            </div>

        </div>

    </section>

</section>

{% endblock content %}
