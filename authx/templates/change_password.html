{% extends "base.html" %}
{% load static %}


{% block title %}
Change Password
{% endblock title %}

{% block content %}

<section class="cp-page">

    <div class="cp-card">

        <div class="cp-header">

            <i class="fa-solid fa-shield-halved cp-icon"></i>

            <h1 class="cp-title">
                Change Password
            </h1>

            <p class="cp-subtitle">
                Update your password to keep your account secure.
            </p>

        </div>

        <form class="cp-form">

            <div class="cp-input-group">

                <label>Current Password</label>

                <div class="cp-password-box">

                    <input id="cpCurrent" class="cp-input" type="password" placeholder="Enter current password"
                        required>

                    <i class="fa-solid fa-eye cp-toggle" data-target="cpCurrent"></i>

                </div>

            </div>

            <div class="cp-input-group">

                <label>New Password</label>

                <div class="cp-password-box">

                    <input id="cpNew" class="cp-input" type="password" placeholder="Enter new password" required>

                    <i class="fa-solid fa-eye cp-toggle" data-target="cpNew"></i>

                </div>

            </div>

            <div class="cp-input-group">

                <label>Confirm Password</label>

                <div class="cp-password-box">

                    <input id="cpConfirm" class="cp-input" type="password" placeholder="Confirm new password" required>

                    <i class="fa-solid fa-eye cp-toggle" data-target="cpConfirm"></i>

                </div>

            </div>

            <button class="cp-btn" type="submit">

                Update Password

            </button>

            <div class="cp-message" id="cpMessage">
            </div>

        </form>

    </div>

</section>

{% endblock %}
