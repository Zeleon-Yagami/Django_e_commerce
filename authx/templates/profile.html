{% extends "base.html" %}
{% load static %}

{% block title %}Profile{% endblock title %}

{% block content %}
<div class="container mt-5">
    <h2>Profile</h2>
    <p><strong>Name:</strong> {{ request.user.name }}</p>
    <p><strong>Username:</strong> {{ request.user.username }}</p>
    <p><strong>Email:</strong> {{ request.user.email }}</p>
</div>
{% endblock content %}
